spring:
  application:
    name: monster-homepage-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:monster_homepage}
    username: ${DB_USER:monster}
    password: ${DB_PASSWORD:monster}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:5MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
  session:
    timeout: ${SESSION_TIMEOUT:8h}
server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: MONSTER_SESSION
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
app:
  seed-data: ${APP_SEED_DATA:true}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:ChangeMe123!}
  storage:
    path: ${APP_STORAGE_PATH:./uploads}
  analytics:
    salt: ${ANALYTICS_SALT:change-me-in-production}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
