name: CI
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test Spring Boot API
        working-directory: api
        run: mvn --batch-mode verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build Next.js
        working-directory: web
        env:
          API_INTERNAL_URL: http://127.0.0.1:8080
          SITE_URL: https://example.com
        run: npm run build
  integration:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20
    env:
      DB_PASSWORD: ci-db-password
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ci-admin-password
      ANALYTICS_SALT: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      DOMAIN: 127.0.0.1
      CADDY_SCHEME: http://
      SESSION_COOKIE_SECURE: "false"
      SMOKE_BASE_URL: http://127.0.0.1
      SMOKE_INSECURE_TLS: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build and start production-style stack
        run: docker compose up -d --build --wait --wait-timeout 240
      - name: Run integration smoke test
        run: python3 scripts/integration-smoke.py
      - name: Print container status and logs
        if: always()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=300
      - name: Stop integration stack
        if: always()
        run: docker compose down -v --remove-orphans
